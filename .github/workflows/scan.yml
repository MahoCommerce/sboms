name: Scan SBOMs

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 09:00 UTC (6h after refresh)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan-sboms
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan
        run: ./scan.sh

      - name: Publish report to job summary
        if: always()
        run: |
          if [[ -f VULNERABILITIES.md ]]; then
            cat VULNERABILITIES.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vulns/ VULNERABILITIES.md badges/
          if git diff --cached --quiet; then
            echo "No vulnerability changes."
            exit 0
          fi
          git commit -m "chore: refresh vulnerability scans ($(date -u +%Y-%m-%d))"
          git push

      - name: Fail if any Critical findings on main
        run: |
          shopt -s nullglob
          critical=0
          for f in vulns/*/main.json; do
            if jq -e '(.summary.Critical // 0) > 0' "$f" > /dev/null; then
              repo="$(basename "$(dirname "$f")")"
              echo "::error::Critical vulnerabilities present in $repo (see $f)"
              critical=1
            fi
          done
          exit $critical
